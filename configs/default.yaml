MODEL:
  in_channels: 1
  dims: [32, 64, 128]

TRAIN:
  batch_size: 4
  epochs: 10
  learning_rate: 0.0001
  min_lr: 0.000001
  weight_decay: 0.0001
  grad_clip: 5.0
  gradient_weight: 6.0
  edge_weight: 1.5
  ssim_weight: 0.6
  mask_region_weight: 0.4
  mask_boundary_weight: 0.8
  detail_weight: 3.0
  lambda_fusion: 1.0
  lambda_aux_det: 0.0
  warmup_epochs: 5

MASK_GUIDANCE:
  guidance_alpha: 0.08

DATA:
  root: ./datasets/M3FD_Detection
  image_size: [256, 256]
  num_workers: 0
  pin_memory: true

DETECTION:
  enabled: false
  num_classes: 6
  detector_cfg: yolo11n.yaml
  detector_pretrained: yolo11n.pt
  detector_input_size: 256
  loss_box: 7.5
  loss_cls: 0.5
  loss_dfl: 1.5
  freeze: false
  initial_no_grad: false
  warmup_freeze_epochs: 5
  lr_mult: 0.1

LOG:
  print_interval: 20
  save_interval: 2
